<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Minesweeper Deck-Building Roguelike</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <div id="git-version-badge">git: --</div>
    <div id="game-container">
        <!-- HUD -->
        <div id="hud">
            <div class="hud-item">
                <span class="hud-label">Mines</span>
                <span class="hud-value" id="mines-count">0</span>
            </div>
            <div class="hud-item">
                <span class="hud-label">Lives</span>
                <span class="hud-value" id="lives-count">0</span>
            </div>
            <div class="hud-item">
                <span class="hud-label">Time</span>
                <span class="hud-value" id="time-elapsed">0</span>
            </div>
        </div>

        <!-- Canvas Container -->
        <div id="canvas-container">
            <canvas id="game-canvas"></canvas>
        </div>

        <!-- Hand Container -->
        <div id="hand-container">
            <!-- Energy Bar -->
            <div id="energy-bar">
                <div class="energy-label">能量</div>
                <div class="energy-display">
                    <span id="energy-current">3/3</span>
                </div>
                <div id="energy-orbs" class="energy-orbs">
                    <div class="energy-orb active"></div>
                    <div class="energy-orb active"></div>
                    <div class="energy-orb active"></div>
                </div>
            </div>

            <!-- Hand Cards -->
            <div id="hand-cards" class="hand-cards">
                <!-- Cards will be dynamically inserted here -->
            </div>

            <!-- Targeting Message -->
            <div id="targeting-message" style="display: none;"></div>
            <button id="card-cancel-button" type="button" style="display: none;">取消</button>
        </div>
    </div>

    <!-- Menu -->
    <div id="menu">
        <h1 class="menu-title">Minesweeper</h1>
        <p class="menu-subtitle">Deck-Building Roguelike</p>
        <div class="menu-buttons">
            <button class="menu-button" id="start-button">Start Game</button>
        </div>
    </div>

    <!-- Dialog Overlay -->
    <div id="dialog-overlay">
        <div id="dialog">
            <h2 id="dialog-title">Title</h2>
            <p id="dialog-message">Message</p>
            <div id="dialog-actions"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module">
        import Game from './js/core/Game.js';
        import EventBus from './js/core/EventBus.js';
        import CONFIG from './js/config.js';

        // Global game instance
        let game;

        // Initialize game when DOM is loaded
        document.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('game-canvas');
            game = new Game();
            game.initialize(canvas);
            initGitVersionBadge();

            // Setup menu buttons
            document.getElementById('start-button').addEventListener('click', () => {
                document.getElementById('menu').classList.add('hidden');
                game.startNewGame();
            });

            // Setup dialog events
            EventBus.on('showDialog', (data) => {
                showDialog(data.title, data.message, data.actions);
            });

            // Setup HUD update events
            EventBus.on('updateHUD', (data) => {
                document.getElementById('mines-count').textContent = data.minesRemaining;
                const seconds = Math.floor(data.timeElapsed / 1000);
                document.getElementById('time-elapsed').textContent = seconds;
                if (data.extraLives !== undefined) {
                    document.getElementById('lives-count').textContent = data.extraLives;
                }
            });

            // Setup state change events
            EventBus.on('stateChanged', (data) => {
                if (data.newState === CONFIG.gameState.MENU) {
                    document.getElementById('menu').classList.remove('hidden');
                }
            });
        });

        // Show dialog function
        function showDialog(title, message, actions) {
            const overlay = document.getElementById('dialog-overlay');
            const titleEl = document.getElementById('dialog-title');
            const messageEl = document.getElementById('dialog-message');
            const actionsEl = document.getElementById('dialog-actions');

            titleEl.textContent = title;
            messageEl.textContent = message;

            // Clear previous actions
            actionsEl.innerHTML = '';

            // Add action buttons
            actions.forEach((action, index) => {
                const button = document.createElement('button');
                button.className = 'dialog-button';
                if (index > 0) button.classList.add('secondary');
                button.textContent = action.label;
                button.addEventListener('click', () => {
                    overlay.style.display = 'none';
                    if (action.action) action.action();
                });
                actionsEl.appendChild(button);
            });

            // Show dialog
            overlay.style.display = 'flex';
        }

        async function initGitVersionBadge() {
            const badge = document.getElementById('git-version-badge');
            if (!badge) return;

            const hash = await resolveGitHash();
            badge.textContent = `git: ${hash}`;
        }

        async function resolveGitHash() {
            const fromVersionFile = await resolveHashFromVersionFile();
            if (fromVersionFile) return fromVersionFile;

            try {
                const headResp = await fetch('./.git/HEAD', { cache: 'no-store' });
                if (!headResp.ok) return 'unknown';

                const head = (await headResp.text()).trim();

                if (head.startsWith('ref: ')) {
                    const refPath = head.slice(5).trim();
                    const refResp = await fetch(`./.git/${refPath}`, { cache: 'no-store' });
                    if (!refResp.ok) return 'unknown';
                    const fullHash = (await refResp.text()).trim();
                    return fullHash.slice(0, 7) || 'unknown';
                }

                return head.slice(0, 7) || 'unknown';
            } catch (error) {
                return 'unknown';
            }
        }

        async function resolveHashFromVersionFile() {
            try {
                const bust = Date.now();
                const resp = await fetch(`./version.json?v=${bust}`, { cache: 'no-store' });
                if (!resp.ok) return null;
                const json = await resp.json();
                if (!json || !json.git) return null;
                return String(json.git).trim().slice(0, 7) || null;
            } catch (error) {
                return null;
            }
        }
    </script>
</body>
</html>
