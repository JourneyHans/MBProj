<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Minesweeper Deck-Building Roguelike</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <div id="git-version-badge">git: --</div>
    <div id="game-container">
        <!-- HUD -->
        <div id="hud">
            <div class="hud-item">
                <span class="hud-label">Mines</span>
                <span class="hud-value" id="mines-count">0</span>
            </div>
            <div class="hud-item">
                <span class="hud-label">Time</span>
                <span class="hud-value" id="time-elapsed">0</span>
            </div>
        </div>

        <div id="main-layout">
            <div id="left-column">
                <!-- Canvas Container -->
                <div id="canvas-container">
                    <canvas id="game-canvas"></canvas>
                    <div id="monster-hover-info" style="display: none;"></div>
                </div>

                <!-- Hand Container -->
                <div id="hand-container">
            <!-- Energy Bar -->
            <div id="energy-bar">
                <div class="resource-block resource-block-hp">
                    <div class="resource-name">血量</div>
                    <div class="resource-display">
                        <span id="hp-current">5/5</span>
                    </div>
                    <div id="hp-orbs" class="resource-orbs">
                        <div class="resource-orb resource-orb-hp active"></div>
                        <div class="resource-orb resource-orb-hp active"></div>
                        <div class="resource-orb resource-orb-hp active"></div>
                        <div class="resource-orb resource-orb-hp active"></div>
                        <div class="resource-orb resource-orb-hp active"></div>
                    </div>
                </div>

                <div class="resource-divider"></div>

                <div class="resource-block resource-block-energy">
                <div class="energy-label">能量</div>
                <div class="energy-display">
                    <span id="energy-current">3/6</span>
                </div>
                <div id="energy-orbs" class="energy-orbs">
                    <div class="energy-orb active"></div>
                    <div class="energy-orb active"></div>
                    <div class="energy-orb active"></div>
                    <div class="energy-orb"></div>
                    <div class="energy-orb"></div>
                    <div class="energy-orb"></div>
                </div>
                </div>
            </div>

            <div id="hand-controls">
                <button id="hand-refresh-button" type="button">抽牌（1⚡）</button>
                <button id="debug-xray-toggle" type="button">透视：关</button>
                <button id="deck-pile-button" type="button" class="pile-button">
                    牌库
                    <span id="deck-pile-count" class="pile-count">0</span>
                </button>
                <button id="discard-pile-button" type="button" class="pile-button">
                    弃牌堆
                    <span id="discard-pile-count" class="pile-count">0</span>
                </button>
                <div id="draw-pile-indicator" class="pile-indicator">
                    抽牌堆
                    <span id="draw-pile-count" class="pile-count">0</span>
                </div>
            </div>

            <!-- Hand Cards -->
            <div id="hand-cards" class="hand-cards">
                <!-- Cards will be dynamically inserted here -->
            </div>

            <!-- Targeting Message -->
            <div id="targeting-message" style="display: none;"></div>
            <button id="card-cancel-button" type="button" style="display: none;">取消</button>

            <div id="discard-pile-modal" style="display: none;">
                <div class="discard-modal-panel">
                    <div class="discard-modal-header">
                        <span>弃牌堆</span>
                        <button id="discard-pile-close" type="button">关闭</button>
                    </div>
                    <div id="discard-pile-list" class="discard-pile-list"></div>
                </div>
            </div>

                    <div id="deck-pile-modal" style="display: none;">
                        <div class="discard-modal-panel">
                            <div class="discard-modal-header">
                                <span>牌库总览</span>
                                <button id="deck-pile-close" type="button">关闭</button>
                            </div>
                            <div id="deck-pile-list" class="discard-pile-list"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Event / Shop Panel -->
            <aside id="right-column">
                <div id="event-shop-panel">
                    <div class="event-shop-header">
                        <div class="event-shop-title">事件与商店</div>
                        <div class="event-shop-gold">金币：<span id="event-shop-gold">0</span></div>
                    </div>
                    <div id="event-brief" class="event-brief">尚未翻开事件。</div>
                    <div id="event-timeline" class="event-timeline"></div>

                    <div class="shop-tier-list" id="shop-tier-list"></div>
                    <div class="shop-actions">
                        <button id="shop-refresh-button" type="button">刷新（-0 金币）</button>
                        <span id="shop-refresh-tip">请先进入商店档位</span>
                    </div>
                    <div id="shop-items" class="shop-items"></div>
                </div>
            </aside>
        </div>
    </div>

    <!-- Menu -->
    <div id="menu">
        <h1 class="menu-title">Minesweeper</h1>
        <p class="menu-subtitle">Deck-Building Roguelike</p>
        <div class="menu-buttons">
            <button class="menu-button" id="start-button">Start Game</button>
        </div>
    </div>

    <!-- Dialog Overlay -->
    <div id="dialog-overlay">
        <div id="dialog">
            <h2 id="dialog-title">Title</h2>
            <p id="dialog-message">Message</p>
            <div id="dialog-actions"></div>
        </div>
    </div>

    <!-- Howler.js (audio library, exposes window.Howl) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js" crossorigin="anonymous"></script>

    <!-- Scripts -->
    <script type="module">
        import Game from './js/core/Game.js';
        import EventBus from './js/core/EventBus.js';
        import CONFIG from './js/config.js';
        import AudioManager from './js/audio/AudioManager.js';
        import EffectsManager from './js/effects/EffectsManager.js';

        // Global game instance
        let game;

        // Initialize game when DOM is loaded
        document.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('game-canvas');
            let hpMax = Math.max(1, Number(CONFIG?.player?.startHp) || 5);

            // Initialize AudioManager (gracefully no-ops if Howler CDN failed)
            AudioManager.init();

            // Initialize EffectsManager overlay canvas
            const effectsFx = new EffectsManager();
            effectsFx.attach(document.getElementById('canvas-container'));

            game = new Game();
            game.audioManager = AudioManager;
            game.effectsManager = effectsFx;
            game.initialize(canvas);
            initGitVersionBadge();

            // Setup menu buttons
            document.getElementById('start-button').addEventListener('click', () => {
                document.getElementById('menu').classList.add('hidden');
                game.startNewGame();
            });

            // Setup dialog events
            EventBus.on('showDialog', (data) => {
                showDialog(data.title, data.message, data.actions);
            });

            // Setup HUD update events
            EventBus.on('updateHUD', (data) => {
                document.getElementById('mines-count').textContent = data.minesRemaining;
                const seconds = Math.floor(data.timeElapsed / 1000);
                document.getElementById('time-elapsed').textContent = seconds;
                if (data.hp !== undefined) {
                    const hpValue = Math.max(0, Math.floor(Number(data.hp) || 0));
                    hpMax = Math.max(hpMax, hpValue, 1);
                    renderHpDisplay(hpValue, hpMax);
                }
            });

            // Setup state change events
            EventBus.on('stateChanged', (data) => {
                if (data.newState === CONFIG.gameState.MENU) {
                    document.getElementById('menu').classList.remove('hidden');
                }
            });

            // Ensure HUD has a sensible initial HP before the first run starts.
            renderHpDisplay(hpMax, hpMax);
        });

        function renderHpDisplay(current, max) {
            const hpCurrentEl = document.getElementById('hp-current');
            const hpOrbsEl = document.getElementById('hp-orbs');
            if (!hpCurrentEl || !hpOrbsEl) return;

            const safeMax = Math.max(1, Math.floor(Number(max) || 1));
            const safeCurrent = Math.max(0, Math.floor(Number(current) || 0));
            hpCurrentEl.textContent = `${safeCurrent}/${safeMax}`;

            hpOrbsEl.innerHTML = '';
            for (let i = 0; i < safeMax; i++) {
                const orb = document.createElement('div');
                orb.className = `resource-orb resource-orb-hp ${i < safeCurrent ? 'active' : ''}`;
                hpOrbsEl.appendChild(orb);
            }
        }

        // Show dialog function
        function showDialog(title, message, actions) {
            const overlay = document.getElementById('dialog-overlay');
            const titleEl = document.getElementById('dialog-title');
            const messageEl = document.getElementById('dialog-message');
            const actionsEl = document.getElementById('dialog-actions');

            titleEl.textContent = title;
            messageEl.textContent = message;

            // Clear previous actions
            actionsEl.innerHTML = '';

            // Add action buttons
            actions.forEach((action, index) => {
                const button = document.createElement('button');
                button.className = 'dialog-button';
                if (index > 0) button.classList.add('secondary');
                button.textContent = action.label;
                button.addEventListener('click', () => {
                    overlay.style.display = 'none';
                    if (action.action) action.action();
                });
                actionsEl.appendChild(button);
            });

            // Show dialog
            overlay.style.display = 'flex';
        }

        async function initGitVersionBadge() {
            const badge = document.getElementById('git-version-badge');
            if (!badge) return;

            const hash = await resolveGitHash();
            badge.textContent = `git: ${hash}`;
        }

        async function resolveGitHash() {
            const fromVersionFile = await resolveHashFromVersionFile();
            if (fromVersionFile) return fromVersionFile;

            try {
                const headResp = await fetch('./.git/HEAD', { cache: 'no-store' });
                if (!headResp.ok) return 'unknown';

                const head = (await headResp.text()).trim();

                if (head.startsWith('ref: ')) {
                    const refPath = head.slice(5).trim();
                    const refResp = await fetch(`./.git/${refPath}`, { cache: 'no-store' });
                    if (!refResp.ok) return 'unknown';
                    const fullHash = (await refResp.text()).trim();
                    return fullHash.slice(0, 7) || 'unknown';
                }

                return head.slice(0, 7) || 'unknown';
            } catch (error) {
                return 'unknown';
            }
        }

        async function resolveHashFromVersionFile() {
            try {
                const bust = Date.now();
                const resp = await fetch(`./version.json?v=${bust}`, { cache: 'no-store' });
                if (!resp.ok) return null;
                const json = await resp.json();
                if (!json || !json.git) return null;
                return String(json.git).trim().slice(0, 7) || null;
            } catch (error) {
                return null;
            }
        }
    </script>
</body>
</html>
